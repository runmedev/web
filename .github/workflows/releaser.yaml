name: Releaser

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      web_branch:
        description: "web repo branch"
        required: false
        default: "main"
      codex_branch:
        description: "codex repo branch"
        required: false
        default: "dev/jlewi/wasm"
      dry_run:
        description: "Run without publishing"
        type: boolean
        required: false
        default: false
  schedule:
    - cron: "0 * * * *"
  pull_request:
    paths:
      - "releaser/**"
      - ".github/workflows/releaser.yaml"

permissions:
  id-token: write
  contents: read

concurrency:
  group: releaser-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  releaser:
    runs-on: ubuntu-latest
    env:
      GCP_PROJECT_ID: runme-lewi-dev
      GCP_PROJECT_NUMBER: "690012737568"
      GCP_WIF_POOL_ID: github-pool
      GCP_WIF_PROVIDER_ID: github-provider
      GCP_SERVICE_ACCOUNT_EMAIL: runme-gha@runme-lewi-dev.iam.gserviceaccount.com
      RELEASER_BUCKET: gs://runme-hosted
      RELEASER_WEB_REPO: runmedev/web
      RELEASER_CODEX_REPO: openai/codex
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        if: github.event_name != 'pull_request'
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/${{ env.GCP_PROJECT_NUMBER }}/locations/global/workloadIdentityPools/${{ env.GCP_WIF_POOL_ID }}/providers/${{ env.GCP_WIF_PROVIDER_ID }}
          service_account: ${{ env.GCP_SERVICE_ACCOUNT_EMAIL }}
          token_format: access_token
          access_token_scopes: https://www.googleapis.com/auth/cloud-platform
          create_credentials_file: true
          export_environment_variables: true

      - name: Setup gcloud
        if: github.event_name != 'pull_request'
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: releaser/go.mod
          cache-dependency-path: releaser/go.sum

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install wasm-bindgen
        shell: bash
        run: |
          set -euo pipefail
          cargo install wasm-bindgen-cli --locked

      - name: Build releaser
        shell: bash
        run: |
          set -euo pipefail
          cd releaser
          go build -o ../releaser-bin .

      - name: Run releaser
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          WEB_BRANCH="main"
          CODEX_BRANCH="dev/jlewi/wasm"
          DRY_RUN="false"

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            if [ -n "${{ github.event.inputs.web_branch }}" ]; then
              WEB_BRANCH="${{ github.event.inputs.web_branch }}"
            fi
            if [ -n "${{ github.event.inputs.codex_branch }}" ]; then
              CODEX_BRANCH="${{ github.event.inputs.codex_branch }}"
            fi
            if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
              DRY_RUN="true"
            fi
          fi

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            DRY_RUN="true"
          fi

          ./releaser-bin \
            --web="${WEB_BRANCH}" \
            --codex="${CODEX_BRANCH}" \
            --web-repo="${RELEASER_WEB_REPO}" \
            --codex-repo="${RELEASER_CODEX_REPO}" \
            --bucket="${RELEASER_BUCKET}" \
            --dry-run="${DRY_RUN}"
